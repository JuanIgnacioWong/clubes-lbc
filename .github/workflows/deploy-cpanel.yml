name: Deploy cPanel

on:
  workflow_dispatch:
    inputs:
      keep_releases:
        description: "Cantidad de releases a conservar"
        required: false
        default: "5"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, bcmath, pdo_mysql, intl, zip
          tools: composer:v2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install PHP dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction

      - name: Install Node dependencies
        run: npm ci

      - name: Build assets
        run: npm run build

      - name: Prepare artifact
        run: |
          rsync -av --delete \
            --exclude '.git' \
            --exclude '.github' \
            --exclude 'node_modules' \
            --exclude 'tests' \
            --exclude '.env' \
            --exclude 'storage/logs/*' \
            --exclude 'storage/framework/cache/*' \
            --exclude 'storage/framework/sessions/*' \
            --exclude 'storage/framework/views/*' \
            --exclude 'storage/app/private/*' \
            ./ ./deploy-artifact/
          tar -czf clubes-lbc-release.tgz -C deploy-artifact .

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.CPANEL_SSH_PRIVATE_KEY }}

      - name: Upload artifact
        run: |
          scp -P "${{ secrets.CPANEL_SSH_PORT }}" -o StrictHostKeyChecking=no \
            clubes-lbc-release.tgz \
            "${{ secrets.CPANEL_SSH_USER }}@${{ secrets.CPANEL_SSH_HOST }}:/tmp/clubes-lbc-release.tgz"
          scp -P "${{ secrets.CPANEL_SSH_PORT }}" -o StrictHostKeyChecking=no \
            scripts/deploy/release.sh \
            "${{ secrets.CPANEL_SSH_USER }}@${{ secrets.CPANEL_SSH_HOST }}:/tmp/clubes-lbc-release.sh"

      - name: Execute release script
        run: |
          ssh -p "${{ secrets.CPANEL_SSH_PORT }}" -o StrictHostKeyChecking=no \
            "${{ secrets.CPANEL_SSH_USER }}@${{ secrets.CPANEL_SSH_HOST }}" \
            "bash -lc 'chmod +x /tmp/clubes-lbc-release.sh && /tmp/clubes-lbc-release.sh \"${{ secrets.CPANEL_APP_PATH }}\" /tmp/clubes-lbc-release.tgz ${{ github.event.inputs.keep_releases || 5 }}'"
